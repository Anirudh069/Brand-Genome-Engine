version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./embeddings:/app/embeddings

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
